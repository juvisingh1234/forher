
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" 
              content="width=device-width, initial-scale=1.0">
        <title>for my baby</title>
        <style>
            body {
                background: pink;
            }

            .geeks {
                width: 20%;
                top: 30%;
                position: absolute;
                left: 40%;
                border-bottom: 10px solid white;
                overflow: hidden;
                animation: animate 2s linear forwards;
            }

            .geeks h1 {
                color: rgb(151, 95, 255);
            }

            @keyframes animate {
                0% {
                    width: 0px;
                    height: 0px;
                }

                30% {
                    width: 50px;
                    height: 0px;
                }

                60% {
                    width: 80px;
                    height: 80px;
                }

                
            }
            .geeks1 {
                width: 20%;
                top: 50%;
                position: absolute;
                left: 40%;
                overflow: hidden;
                animation: animate 2s linear forwards;
            }


            @keyframes animate {
                0% {
                    width: 0px;
                    height: 0px;
                }

                30% {
                    width: 50px;
                    height: 0px;
                }

                60% {
                    width: 80px;
                    height: 80px;
                }

                
            }

            .Btn {
  position: relative;
  width: 150px;
  height: 55px;
  border-radius: 45px;
  border: none;
  background-color: rgb(151, 95, 255);
  color: white;
  box-shadow: 0px 10px 10px rgb(210, 187, 253) inset,
  0px 5px 10px rgba(5, 5, 5, 0.212),
  0px -10px 10px rgb(124, 54, 255) inset;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.Btn::before {
  width: 70%;
  height: 2px;
  position: absolute;
  background-color: rgba(250, 250, 250, 0.678);
  content: "";
  filter: blur(1px);
  top: 7px;
  border-radius: 50%;
}

.Btn::after {
  width: 70%;
  height: 2px;
  position: absolute;
  background-color: rgba(250, 250, 250, 0.137);
  content: "";
  filter: blur(1px);
  bottom: 7px;
  border-radius: 50%;
}

.Btn:hover {
  animation: jello-horizontal 0.9s both;
}

@keyframes jello-horizontal {
  0% {
    transform: scale3d(1, 1, 1);
  }

  30% {
    transform: scale3d(1.25, 0.75, 1);
  }

  40% {
    transform: scale3d(0.75, 1.25, 1);
  }

  50% {
    transform: scale3d(1.15, 0.85, 1);
  }

  65% {
    transform: scale3d(0.95, 1.05, 1);
  }

  75% {
    transform: scale3d(1.05, 0.95, 1);
  }

  100% {
    transform: scale3d(1, 1, 1);
  }
}

        </style>
    </head>

    <body>
        <div class="geeks1">
            <center><a href="index (1).html"><button class="Btn" onclick="index1.html">Click Me!</button></center>
        </div>
        <div class="geeks">
            <h1><center>Happy International Womens Day, Baby!</center></h1>
        </div>
    </body>

    </html>
